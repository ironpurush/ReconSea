<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReconSea — Reports</title>
<link rel="stylesheet" href="/static/css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">
    <a href="/" class="nav-logo"><span class="logo-icon">⬡</span><span class="logo-txt">ReconSea</span></a>
    <div class="nav-links">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/reports" class="nav-link active">Reports</a>
    </div>
  </div>
</nav>

<main class="main-content">
  <div class="page-header-row">
    <div>
      <h1 class="page-title">Scan Reports</h1>
      <p class="page-sub">All completed reconnaissance sessions stored locally</p>
    </div>
    <a href="/" class="btn-primary btn-sm">+ New Scan</a>
  </div>

  <div class="toolbar-row">
    <input type="text" id="searchReports" class="search-input" placeholder="Search by target or engagement...">
    <select id="filterStatus" class="filter-select">
      <option value="">All statuses</option>
      <option value="completed">Completed</option>
      <option value="running">Running</option>
      <option value="failed">Failed</option>
    </select>
  </div>

  <div id="reportsList"><div class="loading-placeholder">Loading reports...</div></div>
</main>

<div id="toastContainer" class="toast-container"></div>

<footer class="footer">
  <div class="footer-inner">
    <span class="footer-logo">⬡ ReconSea</span><span class="sep">·</span>
    <span>Created by <strong>Sagar Jondhale aka IronPurush</strong></span>
  </div>
</footer>

<script src="/static/js/app.js"></script>
<script src="/static/js/reports.js"></script>
</body>
</html>
